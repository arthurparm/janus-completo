services:
  neo4j:
    image: neo4j:5.19-community
    container_name: janus_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.pc2}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-2G}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-8G}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE:-12G}
    volumes:
      - janus_neo4j_data:/data
    restart: unless-stopped
    mem_limit: ${NEO4J_MEM_LIMIT:-24g}
    cpus: "${NEO4J_CPUS:-10.0}"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - janus-pc2-net

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: janus_qdrant
    ports:
      - "6333:6333"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env.pc2}
    volumes:
      - janus_qdrant_data:/qdrant/storage
    restart: unless-stopped
    mem_limit: ${QDRANT_MEM_LIMIT:-12g}
    cpus: "${QDRANT_CPUS:-6.0}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - janus-pc2-net

  ollama:
    image: ollama/ollama:latest
    container_name: janus_ollama
    ports:
      - "11434:11434"
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-120m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-256}
    volumes:
      - janus_ollama_data:/root/.ollama
    restart: unless-stopped
    mem_limit: ${OLLAMA_MEM_LIMIT:-24g}
    cpus: "${OLLAMA_CPUS:-12.0}"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - janus-pc2-net

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: janus_ollama_model_init
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_ORCHESTRATOR_MODEL=${OLLAMA_ORCHESTRATOR_MODEL:-gpt-oss:20b}
      - OLLAMA_CODER_MODEL=${OLLAMA_CODER_MODEL:-deepseek-coder:6.7b}
      - OLLAMA_CURATOR_MODEL=${OLLAMA_CURATOR_MODEL:-ministral-3:14b}
      - OLLAMA_AUTO_PULL_MODELS=${OLLAMA_AUTO_PULL_MODELS:-true}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -eu
        sanitize() {
          printf "%s" "$$1" | tr -d '\r' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
        }
        echo "Waiting Ollama..."
        for i in $$(seq 1 60); do
          if ollama list >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        if [ "$$(sanitize "$$OLLAMA_AUTO_PULL_MODELS")" != "true" ]; then
          echo "Skipping model pull (OLLAMA_AUTO_PULL_MODELS!=true)."
          ollama list || true
          exit 0
        fi
        ORCH_MODEL="$$(sanitize "$$OLLAMA_ORCHESTRATOR_MODEL")"
        CODER_MODEL="$$(sanitize "$$OLLAMA_CODER_MODEL")"
        CURATOR_MODEL="$$(sanitize "$$OLLAMA_CURATOR_MODEL")"
        for model in "$$ORCH_MODEL" "$$CODER_MODEL" "$$CURATOR_MODEL"; do
          if [ -z "$$model" ]; then
            continue
          fi
          echo "Pulling model: $$model"
          if ! ollama pull "$$model"; then
            echo "Warning: failed to pull $$model"
          fi
        done
        ollama list
    restart: "no"
    networks:
      - janus-pc2-net

networks:
  janus-pc2-net:
    driver: bridge

volumes:
  janus_neo4j_data:
  janus_qdrant_data:
  janus_ollama_data:
