{% extends "base.html" %}
{% block title %}Filas & Políticas{% endblock %}
{% block content %}
<div class="container">
  <h1>Filas & Políticas</h1>
  <p>Saúde do broker, estado das filas e validação de políticas.</p>

  <div class="grid">
    <div class="card">
      <h2>Saúde do Broker</h2>
      <ul id="brokerHealth" class="kv-list"></ul>
      <div class="actions"><button id="refreshBroker" class="btn">Checar Broker</button></div>
    </div>

    <div class="card">
      <h2>Filas</h2>
      <div class="metrics-grid" id="queuesGrid"></div>
      <div class="actions"><button id="refreshQueues" class="btn">Atualizar Filas</button></div>
    </div>
  </div>
</div>

<script>
const QUEUES = [
  'knowledge_consolidation',
  'agent_tasks',
  'neural_training',
  'data_harvesting',
  'meta_agent_cycle',
];

async function safeFetch(url, options={}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  } catch (err) {
    console.error('Fetch error:', url, err);
    return null;
  }
}

function renderKVList(el, obj) {
  el.innerHTML = '';
  if (!obj) { el.innerHTML = '<li class="error">Erro ao carregar</li>'; return; }
  Object.entries(obj).forEach(([k,v]) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="key">${k}</span><span class="value">${typeof v === 'object' ? JSON.stringify(v) : v}</span>`;
    el.appendChild(li);
  });
}

async function loadBrokerHealth() {
  const data = await safeFetch('/api/v1/tasks/health/rabbitmq');
  renderKVList(document.getElementById('brokerHealth'), data);
}

function queueCardTemplate(name, info, policy, validation) {
  const backlog = info?.backlog ?? info?.messages ?? info?.message_count ?? '—';
  const consumers = info?.consumers ?? info?.consumer_count ?? '—';
  const rate = info?.rate ?? info?.messages_rate ?? '—';
  const policyShort = policy ? JSON.stringify(policy) : '—';
  const validationShort = validation ? (validation.valid === false ? 'inválida' : 'válida') : '—';
  return `
    <div class="metric-card">
      <div class="metric-title">${name}</div>
      <ul class="kv-list">
        <li><span class="key">Backlog</span><span class="value">${backlog}</span></li>
        <li><span class="key">Consumidores</span><span class="value">${consumers}</span></li>
        <li><span class="key">Taxa</span><span class="value">${rate}</span></li>
      </ul>
      <div class="subsection">
        <div><strong>Política</strong></div>
        <pre class="metric-value">${policyShort}</pre>
        <div class="badge ${validationShort==='inválida' ? 'warning' : 'success'}">${validationShort}</div>
      </div>
      <div class="actions">
        <button class="btn" data-action="validate" data-q="${name}">Validar</button>
        <button class="btn" data-action="reconcile" data-q="${name}">Reconciliar</button>
        <button class="btn" data-action="details" data-q="${name}">Detalhes</button>
      </div>
    </div>
  `;
}

async function fetchQueueInfo(name) {
  const info = await safeFetch(`/api/v1/tasks/queue/${name}`);
  const policy = await safeFetch(`/api/v1/tasks/queue/${name}/policy`);
  const validation = await safeFetch(`/api/v1/tasks/queue/${name}/policy/validate`);
  return { info, policy, validation };
}

async function validatePolicy(name) {
  const res = await safeFetch(`/api/v1/tasks/queue/${name}/policy/validate`);
  return res;
}

async function reconcilePolicy(name) {
  const res = await safeFetch(`/api/v1/tasks/queue/${name}/policy/reconcile`, { method: 'POST' });
  return res;
}

async function loadQueues() {
  const grid = document.getElementById('queuesGrid');
  grid.innerHTML = '';
  for (const q of QUEUES) {
    const { info, policy, validation } = await fetchQueueInfo(q);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = queueCardTemplate(q, info, policy, validation);
    grid.appendChild(wrapper.firstElementChild);
  }

  // wire actions
  grid.querySelectorAll('[data-action="validate"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const q = btn.getAttribute('data-q');
      await validatePolicy(q);
      await loadQueues();
    });
  });
  grid.querySelectorAll('[data-action="reconcile"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const q = btn.getAttribute('data-q');
      if (!confirm(`Reconciliar política da fila ${q}?`)) return;
      await reconcilePolicy(q);
      await loadQueues();
    });
  });
  grid.querySelectorAll('[data-action="details"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const q = btn.getAttribute('data-q');
      const data = await safeFetch(`/api/v1/tasks/queue/${q}`);
      alert(`${q}:\n` + JSON.stringify(data, null, 2));
    });
  });
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('refreshBroker').addEventListener('click', loadBrokerHealth);
  document.getElementById('refreshQueues').addEventListener('click', loadQueues);
  loadBrokerHealth();
  loadQueues();
});
</script>
{% endblock %}
