{% extends "base.html" %}
{% block content %}
<section>
    <h2>Overview</h2>
    <p>Resumo de provedores, circuit breakers e cache com visual mais humano.</p>

    <div class="card" style="margin-bottom: 0.75rem; display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
        <div>
            <label for="provider-filter">Filtro de Provedor</label>
            <select id="provider-filter" data-ui="custom">
                <option value="all" selected>todos</option>
            </select>
        </div>
        <div>
            <label for="breaker-filter">Breaker</label>
            <select id="breaker-filter" data-ui="custom">
                <option value="all" selected>todos</option>
                <option value="open">aberto</option>
                <option value="half">semi-aberto</option>
                <option value="closed">fechado</option>
            </select>
        </div>
        <div style="flex:1 1 240px;">
            <label for="cache-search">Cache (busca)</label>
            <input id="cache-search" type="text" placeholder="filtrar por texto..."/>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Sistema</h3>
            <div id="system-wrap" class="metrics-grid"></div>
        </div>
        <div class="card">
            <h3>Provedores</h3>
            <div id="providers-wrap" class="metrics-grid"></div>
        </div>
        <div class="card">
            <h3>Circuit Breakers</h3>
            <div id="breakers-wrap" class="metrics-grid"></div>
        </div>
        <div class="card">
            <h3>Cache</h3>
            <div id="cache-wrap" class="metrics-grid"></div>
        </div>
    </div>

    <h3 style="margin-top:0.75rem;">Métricas (Grafana)</h3>
    <p>Se Grafana estiver configurado, incorpore um iframe aqui.</p>
    <!-- <iframe src="http://localhost:3000/d/..." width="100%" height="400"></iframe> -->

    <script>
        // Dados do servidor
        const systemData = {
        {
            system | tojson
        }
        }
        ;
        const providersData = {
        {
            providers | tojson
        }
        }
        ;
        const breakersData = {
        {
            breakers | tojson
        }
        }
        ;
        const cacheData = {
        {
            cache_entries | tojson
        }
        }
        ;

        // Custom Select
        function initCustomSelect(sel) {
            if (!sel || sel.dataset.ui !== 'custom') return;
            const wrap = document.createElement('div');
            wrap.className = 'custom-select';
            sel.parentNode.insertBefore(wrap, sel);
            wrap.appendChild(sel);
            const trigger = document.createElement('div');
            trigger.className = 'select-trigger';
            trigger.tabIndex = 0;
            trigger.setAttribute('role', 'button');
            trigger.setAttribute('aria-haspopup', 'listbox');
            trigger.setAttribute('aria-expanded', 'false');
            wrap.appendChild(trigger);
            const labelSpan = document.createElement('span');
            labelSpan.className = 'select-label';
            labelSpan.textContent = sel.options[sel.selectedIndex]?.text || sel.value || '';
            trigger.appendChild(labelSpan);
            const menu = document.createElement('div');
            menu.className = 'select-menu';
            menu.setAttribute('role', 'listbox');
            wrap.appendChild(menu);
            Array.from(sel.options).forEach((opt, idx) => {
                const o = document.createElement('div');
                o.className = 'select-option';
                o.setAttribute('role', 'option');
                o.setAttribute('data-value', opt.value);
                o.textContent = opt.text;
                if (idx === sel.selectedIndex) o.classList.add('selected');
                o.addEventListener('click', () => {
                    sel.value = opt.value;
                    labelSpan.textContent = opt.text;
                    menu.querySelectorAll('.select-option').forEach(x => x.classList.remove('selected'));
                    o.classList.add('selected');
                    wrap.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                    sel.dispatchEvent(new Event('change', {bubbles: true}));
                });
                menu.appendChild(o);
            });

            function toggleMenu(forceOpen) {
                const willOpen = forceOpen ?? !wrap.classList.contains('open');
                wrap.classList.toggle('open', willOpen);
                trigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
            }

            trigger.addEventListener('click', () => toggleMenu());
            trigger.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    toggleMenu();
                }
                if (ev.key === 'Escape') {
                    wrap.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            });
            document.addEventListener('click', (ev) => {
                if (!wrap.contains(ev.target)) {
                    wrap.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            });
            sel.addEventListener('change', () => {
                const curr = sel.options[sel.selectedIndex];
                labelSpan.textContent = curr?.text || sel.value || '';
                menu.querySelectorAll('.select-option').forEach(x => x.classList.toggle('selected', x.getAttribute('data-value') === sel.value));
            });
        }

        // Controles de tema/circuito foram movidos para o menu (base.html)

        // Helpers
        function createCard(title) {
            const el = document.createElement('div');
            el.className = 'card';
            const h = document.createElement('h4');
            h.textContent = title;
            el.appendChild(h);
            return el;
        }

        function renderKVList(obj) {
            const ul = document.createElement('ul');
            ul.className = 'kv-list';
            try {
                Object.entries(obj || {}).forEach(([k, v]) => {
                    const li = document.createElement('li');
                    const kspan = document.createElement('span');
                    kspan.className = 'key';
                    kspan.textContent = k;
                    const vspan = document.createElement('span');
                    vspan.className = 'val';
                    vspan.textContent = typeof v === 'object' ? '[obj]' : String(v);
                    li.appendChild(kspan);
                    li.appendChild(vspan);
                    ul.appendChild(li);
                });
            } catch {
            }
            return ul;
        }

        function renderDetails(obj) {
            const det = document.createElement('details');
            const sum = document.createElement('summary');
            sum.textContent = 'Detalhes';
            det.appendChild(sum);
            const pre = document.createElement('pre');
            pre.className = 'small-pre';
            pre.textContent = JSON.stringify(obj, null, 2);
            det.appendChild(pre);
            return det;
        }

        function statusBadge(text) {
            const b = document.createElement('span');
            b.className = 'badge';
            const t = String(text || '').toLowerCase();
            if (t.includes('open') && !t.includes('closed')) b.classList.add('badge-open'); else if (t.includes('closed')) b.classList.add('badge-closed'); else if (t.includes('half')) b.classList.add('badge-half'); else b.classList.add('badge-neutral');
            b.textContent = text || 'desconhecido';
            return b;
        }

        // Render Sistema
        function renderSystem() {
            const wrap = document.getElementById('system-wrap');
            if (!wrap) return;
            wrap.innerHTML = '';
            const blocks = [
                {
                    title: 'Identidade', data: {
                        nome: (systemData?.config?.identity_name ?? window.identity_name ?? 'Janus'),
                        enforcement: Boolean(systemData?.config?.identity_enforcement)
                    }
                },
                {
                    title: 'Ambiente', data: {
                        app: systemData?.app_name,
                        env: systemData?.environment,
                        version: systemData?.version,
                        timestamp: systemData?.timestamp
                    }
                },
                {
                    title: 'Uptime/Processo', data: {
                        uptime_s: systemData?.uptime_seconds,
                        pid: systemData?.process?.pid,
                        threads: systemData?.process?.threads,
                        rss_mb: systemData?.process?.rss_mb
                    }
                },
                {
                    title: 'Performance', data: {
                        cpu_percent: systemData?.performance?.cpu_percent,
                        memory_percent: systemData?.performance?.memory_percent,
                    }
                },
            ];
            blocks.forEach(b => {
                const card = createCard(b.title);
                card.appendChild(renderKVList(b.data));
                wrap.appendChild(card);
            });
            const raw = createCard('Bruto');
            raw.appendChild(renderDetails(systemData));
            wrap.appendChild(raw);
        }

        // Render Providers
        function renderProviders(filterVal = 'all') {
            const wrap = document.getElementById('providers-wrap');
            wrap.innerHTML = '';
            const items = Array.isArray(providersData)
                ? providersData.map(p => ({name: p.name || p.provider || 'provider', info: p}))
                : Object.entries(providersData || {}).map(([name, info]) => ({name, info}));
            items.filter(it => filterVal === 'all' || it.name === filterVal).forEach(it => {
                const card = createCard(it.name || 'provider');
                card.appendChild(renderKVList(it.info));
                card.appendChild(renderDetails(it.info));
                wrap.appendChild(card);
            });
        }

        // Render Breakers
        function renderBreakers(filterVal = 'all') {
            const wrap = document.getElementById('breakers-wrap');
            wrap.innerHTML = '';
            const items = Array.isArray(breakersData)
                ? breakersData.map(b => ({name: b.provider || 'breaker', info: b}))
                : Object.entries(breakersData || {}).map(([name, info]) => ({name, info}));
            items.forEach(it => {
                const status = (it.info && (it.info.state || it.info.status)) || (typeof it.info === 'string' ? it.info : 'desconhecido');
                const statusLower = String(status || '').toLowerCase();
                const statusKey = statusLower.includes('open') && !statusLower.includes('closed') ? 'open' : statusLower.includes('closed') ? 'closed' : statusLower.includes('half') ? 'half' : 'other';
                if (filterVal !== 'all' && filterVal !== statusKey) return;
                const card = createCard(it.name || 'breaker');
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.alignItems = 'center';
                row.style.gap = '0.5rem';
                const label = document.createElement('span');
                label.textContent = 'status:';
                label.className = 'muted';
                row.appendChild(label);
                row.appendChild(statusBadge(status));
                card.appendChild(row);
                card.appendChild(renderKVList(it.info));
                card.appendChild(renderDetails(it.info));
                wrap.appendChild(card);
            });
        }

        // Render Cache
        function renderCache(searchText = '') {
            const wrap = document.getElementById('cache-wrap');
            wrap.innerHTML = '';
            const items = Array.isArray(cacheData) ? cacheData : Object.entries(cacheData || {}).map(([key, val]) => ({
                key,
                val
            }));
            items.filter(it => {
                const blob = JSON.stringify(it, null, 2).toLowerCase();
                return !searchText || blob.includes(searchText.toLowerCase());
            }).forEach(it => {
                const title = it.key || 'entry';
                const card = createCard(title);
                card.appendChild(renderKVList(it.val || it));
                card.appendChild(renderDetails(it.val || it));
                wrap.appendChild(card);
            });
        }

        // Filtros: preencher e ligar
        const providerFilter = document.getElementById('provider-filter');
        const breakerFilter = document.getElementById('breaker-filter');
        const cacheSearch = document.getElementById('cache-search');
        // preencher providers no filtro
        (function fillProviderOptions() {
            const names = Array.isArray(providersData) ? providersData.map(x => x.name || x.id || 'provider') : Object.keys(providersData || {});
            names.forEach(n => {
                const opt = document.createElement('option');
                opt.value = n;
                opt.textContent = n;
                providerFilter.appendChild(opt);
            });
        })();
        // custom selects
        initCustomSelect(providerFilter);
        initCustomSelect(breakerFilter);
        // listeners
        providerFilter.addEventListener('change', () => renderProviders(providerFilter.value));
        breakerFilter.addEventListener('change', () => renderBreakers(breakerFilter.value));
        cacheSearch.addEventListener('input', () => renderCache(cacheSearch.value));

        // Inicial render
        renderSystem();
        renderProviders('all');
        renderBreakers('all');
        renderCache('');
    </script>
</section>
{% endblock %}
