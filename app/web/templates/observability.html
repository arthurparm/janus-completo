{% extends "base.html" %}
{% block title %}Observabilidade{% endblock %}
{% block content %}
<div class="container">
  <h1>Observabilidade</h1>
  <p>Saúde do sistema, componentes e métricas em tempo real.</p>

  <div class="actions">
    <button id="refreshAll" class="btn">Atualizar tudo</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Saúde do Sistema</h2>
      <ul id="systemHealth" class="kv-list"></ul>
    </div>

    <div class="card">
      <h2>Componentes</h2>
      <div id="componentsHealth" class="metrics-grid"></div>
    </div>

    <div class="card">
      <h2>Métricas (Resumo)</h2>
      <div id="metricsSummary" class="metrics-grid"></div>
    </div>

    <div class="card">
      <h2>Poison Pills (Resumo)</h2>
      <ul id="poisonStats" class="kv-list"></ul>
      <div class="actions">
        <a href="/poison-pills" class="btn">Ver detalhes</a>
      </div>
    </div>
  </div>
</div>

<script>
async function safeFetch(url, options={}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  } catch (err) {
    console.error('Fetch error:', url, err);
    return null;
  }
}

function renderKVList(el, obj) {
  el.innerHTML = '';
  if (!obj) { el.innerHTML = '<li class="error">Erro ao carregar</li>'; return; }
  Object.entries(obj).forEach(([k,v]) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="key">${k}</span><span class="value">${typeof v === 'object' ? JSON.stringify(v) : v}</span>`;
    el.appendChild(li);
  });
}

function renderMetricsGrid(el, obj) {
  el.innerHTML = '';
  if (!obj) { el.innerHTML = '<div class="error">Erro ao carregar</div>'; return; }
  Object.entries(obj).forEach(([k,v]) => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.innerHTML = `<div class="metric-title">${k}</div><div class="metric-value">${typeof v === 'object' ? JSON.stringify(v) : v}</div>`;
    el.appendChild(card);
  });
}

async function loadSystemHealth() {
  const data = await safeFetch('/api/v1/observability/health/system');
  renderKVList(document.getElementById('systemHealth'), data);
}

async function loadComponentsHealth() {
  const data = await safeFetch('/api/v1/observability/health/check-all');
  // Espera-se que retorne algo como { component: { status: 'ok', details: {...} } }
  const el = document.getElementById('componentsHealth');
  el.innerHTML = '';
  if (!data) { el.innerHTML = '<div class="error">Erro ao carregar</div>'; return; }
  Object.entries(data).forEach(([name, info]) => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    const status = info && (info.status || info.healthy || info.ok || 'desconhecido');
    const details = info && (info.details || info.meta || info);
    card.innerHTML = `
      <div class="metric-title">${name}</div>
      <div class="badge ${status==='ok' || status===true ? 'success' : 'warning'}">${String(status)}</div>
      <pre class="metric-value">${typeof details === 'object' ? JSON.stringify(details, null, 2) : String(details)}</pre>
    `;
    el.appendChild(card);
  });
}

async function loadMetricsSummary() {
  const data = await safeFetch('/api/v1/observability/metrics/summary');
  renderMetricsGrid(document.getElementById('metricsSummary'), data);
}

async function loadPoisonStats() {
  const data = await safeFetch('/api/v1/observability/poison-pills/stats');
  renderKVList(document.getElementById('poisonStats'), data);
}

async function refreshAll() {
  await Promise.all([
    loadSystemHealth(),
    loadComponentsHealth(),
    loadMetricsSummary(),
    loadPoisonStats(),
  ]);
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('refreshAll').addEventListener('click', refreshAll);
  refreshAll();
});
</script>
{% endblock %}
