name: Deploy via ftp

on: push

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout (agora @v5)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Setup Node.js (agora @v5)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      # 3. Instala as dependências (front)
      - name: Install dependencies (front)
        run: npm ci
        working-directory: front

      # 3.1. Cria o .env.production com a URL da API (Tailscale/Public)
      - name: Create .env.production (VITE_API_BASE_URL)
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.BACKEND_API_URL }}" > .env.production
        working-directory: front

      # 4. Compila a aplicação Angular (Angular 20)
      - name: Build Angular application (Angular 20)
        run: npm run build -- --configuration production --base-href /
        working-directory: front

      # 5. Faz o deploy para o FTP com sincronização (limpeza)
      - name: FTP Deploy (com sincronização)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          local-dir: front/dist/janus-angular/browser/
          server-dir: public_html/janus-front/
          dangerous-clean-slate: true