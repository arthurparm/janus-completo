name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run standardized lint gate
        run: |
          ruff check --config backend/pyproject.toml \
            backend/app/services/db_migration_service.py \
            qa/test_api_visibility_endpoints.py \
            qa/test_tool_executor_policy_guards.py \
            qa/test_chat_endpoint_contract.py \
            qa/test_observability_request_dashboard.py \
            qa/test_db_migration_service_contract.py

  backend-type:
    name: Backend Type
    needs: backend-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install type dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run standardized type gate
        run: |
          mypy --config-file backend/pyproject.toml --follow-imports=skip \
            backend/app/services/db_migration_service.py

  backend-tests:
    name: Backend Critical Tests
    needs: backend-type
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            pytest-asyncio \
            fastapi \
            pydantic \
            pydantic-settings \
            structlog \
            sqlalchemy \
            psycopg2-binary \
            qdrant-client \
            prometheus-client \
            prometheus-fastapi-instrumentator \
            langchain \
            langchain-core \
            langgraph \
            langgraph-checkpoint-postgres \
            msgpack \
            langchain-ollama \
            langchain-community \
            asyncpg \
            aio-pika \
            redis \
            neo4j \
            langchain-google-genai \
            neo4j-graphrag

      - name: Run critical suite
        env:
          PYTHONPATH: backend
        run: |
          pytest -q \
            qa/test_api_visibility_endpoints.py \
            qa/test_tool_executor_policy_guards.py \
            qa/test_chat_agent_loop_content_safety.py \
            qa/test_memory_quota_enforcement.py \
            qa/test_generative_memory_llm_role_priority.py \
            qa/test_chat_endpoint_contract.py \
            qa/test_observability_request_dashboard.py \
            qa/test_db_migration_service_contract.py \
            qa/test_knowledge_code_query_contract.py

      - name: Run MR-013 offline evaluation gate
        run: |
          python backend/scripts/eval_technical_qa.py \
            --mode offline-codebase \
            --repo-root . \
            --dataset backend/evals/technical-qa/datasets/technical-qa.v1.json \
            --runs-root outputs/qa/technical-qa/runs \
            --baselines-root backend/evals/technical-qa/baselines \
            --compare-baseline \
            --gate-on-regression \
            --require-baseline \
            --max-pass-rate-drop 0.02 \
            --max-citation-coverage-drop 0.02 \
            --max-p95-latency-increase-ms 250

      - name: Upload MR-013 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mr013-offline-eval-artifacts
          path: outputs/qa/technical-qa/runs

  frontend-quality:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js (with npm cache)
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Setup Node.js (no cache)
        if: ${{ hashFiles('frontend/package-lock.json') == '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies (front via npm ci)
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm ci
        working-directory: frontend

      - name: Install dependencies (front via npm install)
        if: ${{ hashFiles('frontend/package-lock.json') == '' }}
        run: npm install
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build -- --configuration development
        working-directory: frontend

  ops-validation:
    name: Ops Validation (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start stack
        run: docker compose up -d

      - name: Wait API health
        run: |
          for i in {1..90}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose ps
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA script dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate API matrix and OQ-011 coverage report
        run: |
          python tooling/generate_api_matrix.py
          python tooling/generate_api_coverage_report.py \
            --collect-docker-evidence \
            --output-json outputs/qa/api_coverage_report.json \
            --output-md outputs/qa/api_coverage_report.md \
            --docker-evidence-json outputs/qa/docker_evidence.json \
            --docker-log-tail-file outputs/qa/janus_api_log_tail.txt

      - name: Snapshot OQ-002 domain SLO report
        run: |
          mkdir -p outputs/qa
          curl -sf "http://localhost:8000/api/v1/observability/slo/domains?window_minutes=15&min_events=20" \
            > outputs/qa/domain_slo_report.json

      - name: Run async operational validation
        run: |
          python tooling/async_ops_validation.py \
            --base-url http://localhost:8000 \
            --users 8 \
            --timeout 45 \
            --chaos-timeout 90

      - name: Upload ops report
        uses: actions/upload-artifact@v4
        with:
          name: qa-ops-and-api-coverage-artifacts
          path: |
            outputs/qa/async_ops_validation_report.json
            outputs/qa/api_coverage_report.json
            outputs/qa/api_coverage_report.md
            outputs/qa/docker_evidence.json
            outputs/qa/janus_api_log_tail.txt
            outputs/qa/domain_slo_report.json
            documentation/qa/api-endpoint-matrix.json
            documentation/qa/api-endpoint-matrix.md
