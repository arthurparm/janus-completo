name: Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: front
        run: npm install
      - name: Lint
        working-directory: front
        run: npm run lint
      - name: Build
        working-directory: front
        run: npm run build

  conventional-commits:
    name: PR Title Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const regex = /^(feat|fix|docs|style|refactor|test|build|ci|chore|perf|revert)(\(.+\))?:\s.+/;
            if (!regex.test(title)) {
              core.setFailed(`PR title does not follow Conventional Commits. Got: "${title}"`);
            } else {
              core.info('PR title follows Conventional Commits');
            }