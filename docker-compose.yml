services:
  janus-api:
    build: .
    container_name: janus_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./workspace:/app/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude /app/workspace/
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - janus-net

  neo4j:
    image: neo4j:5-community
    container_name: janus_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      # This line enables the APOC plugin (Correct from last fix)
      NEO4J_PLUGINS: '["apoc"]'
    networks:
      - janus-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s

  chroma:
    image: chromadb/chroma
    container_name: janus_chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/.chroma/index
    networks:
      - janus-net

  # --- NOVO SERVIÇO SPRINT 10 ---
  ollama:
    image: ollama/ollama
    container_name: janus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - janus-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  janus-net:
    driver: bridge