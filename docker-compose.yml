services:
  janus-api:
    build:
      context: ./janus
      dockerfile: docker/Dockerfile
    container_name: janus_api
    env_file:
      - ./janus/app/.env
    ports:
      - "8000:8000"
    volumes:
      - ./janus/app:/app/app
      - ./janus/workspace:/app/workspace
      - ./janus/tests:/app/tests
      - ./janus/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./janus/app/serviceAccountKey.json:/app/app/serviceAccountKey.json:ro
    command: [ "sh", "-lc", "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug" ]
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - janus-net
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: janus_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./janus/data/redis:/data
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  front:
    image: node:20-alpine
    container_name: janus_front
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - VITE_SUPABASE_URL=https://tfunopczianlvppoabmz.supabase.co
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    command: [ "sh", "-lc", "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --port 4300 --proxy-config proxy.docker.conf.json" ]
    ports:
      - "4300:4300"
    networks:
      - janus-net
    depends_on:
      janus-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5.19-community
    container_name: janus_neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - ./janus/data/neo4j:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=4G
      - NEO4J_server_memory_heap_max__size=16G
      - NEO4J_server_memory_pagecache_size=8G
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1'" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 24G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: janus_qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./janus/data/qdrant:/qdrant/storage
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    build:
      context: ./janus
      dockerfile: docker/ollama.Dockerfile
    container_name: janus_ollama
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ./janus/data/ollama:/root/.ollama
      - ./janus/scripts/init-ollama.sh:/init-ollama.sh
    networks:
      - janus-net
    entrypoint: [ "/bin/sh", "-lc", "tr -d '\r' < /init-ollama.sh > /tmp/init.sh && /bin/sh /tmp/init.sh" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /tmp/tags.json && grep -q '\"model\":\"qwen2.5:14b\"' /tmp/tags.json && grep -q '\"model\":\"qwen2.5-coder:14b\"' /tmp/tags.json" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: janus_postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./janus/data/postgres:/var/lib/postgresql/data
    env_file:
      - ./janus/app/.env
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: janus_rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - ./janus/data/rabbitmq:/var/lib/rabbitmq
    env_file:
      - ./janus/app/.env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=/
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: janus_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./janus/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - janus-net
    depends_on:
      janus-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: janus_grafana
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./janus/app/.env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./janus/grafana/provisioning:/etc/grafana/provisioning
      - ./janus/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - janus-net
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  janus-net:
    driver: bridge
