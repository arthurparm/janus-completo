services:
  janus-api:
    build:
      context: ./janus
      dockerfile: docker/Dockerfile
    container_name: janus_api
    env_file:
      - ./janus/config/.env
    ports:
      - "8000:8000"
    volumes:
      - ./janus/app:/app/app
      - ./janus/workspace:/app/workspace
      - ./janus/tests:/app/tests
      - ./janus/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: [ "sh", "-lc", "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug" ]
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - janus-net
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_ORCHESTRATOR_MODEL=llama3.1:8b
      - OLLAMA_CODER_MODEL=llama3.1:8b
      - OLLAMA_CURATOR_MODEL=llama3.1:8b
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333

  front:
    image: node:20
    container_name: janus_front
    working_dir: /app
    volumes:
      - ./front:/app
    environment:
      - VITE_SUPABASE_URL=https://tfunopczianlvppoabmz.supabase.co
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    command: [ "bash", "-lc", "npm install && npx ng serve --host 0.0.0.0 --port 4300 --proxy-config proxy.docker.conf.json" ]
    ports:
      - "4300:4300"
    networks:
      - janus-net
    depends_on:
      janus-api:
        condition: service_started

  neo4j:
    image: neo4j:5-community
    container_name: janus_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./janus/data/neo4j:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=1G
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1'" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: janus_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./janus/data/qdrant:/qdrant/storage
    networks:
      - janus-net

    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    build:
      context: ./janus
      dockerfile: docker/ollama.Dockerfile
    container_name: janus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./janus/data/ollama:/root/.ollama
      - ./janus/scripts/init-ollama.sh:/init-ollama.sh
    networks:
      - janus-net
    entrypoint: [ "/bin/sh", "-lc", "tr -d '\r' < /init-ollama.sh > /tmp/init.sh && /bin/sh /tmp/init.sh" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /tmp/tags.json && grep -q '\"model\":\"llama3.1:8b\"' /tmp/tags.json && grep -q '\"model\":\"codellama:7b\"' /tmp/tags.json && grep -q '\"model\":\"phi3:mini\"' /tmp/tags.json" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: janus_mysql
    ports:
      - "3306:3306"
    volumes:
      - ./janus/data/mysql:/var/lib/mysql
      - ./janus/sql/init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-janus_root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-janus_config}
      - MYSQL_USER=${MYSQL_USER:-janus}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-janus_pass}
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-janus_root}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: janus_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./janus/data/rabbitmq:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-janus}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-janus_pass}
      - RABBITMQ_DEFAULT_VHOST=/
    networks:
      - janus-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: janus_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./janus/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - janus-net
    depends_on:
      janus-api:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.2
    container_name: janus_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./janus/grafana/provisioning:/etc/grafana/provisioning
      - ./janus/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - janus-net
    depends_on:
      prometheus:
        condition: service_started

networks:
  janus-net:
    driver: bridge
