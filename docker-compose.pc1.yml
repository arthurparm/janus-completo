services:
  janus-api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      args:
        JANUS_BUILD_REF: ${JANUS_BUILD_REF:-local-dev}
    image: janus-completo-janus-api:latest
    container_name: janus_api
    init: true
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - JANUS_BUILD_REF=${JANUS_BUILD_REF:-local-dev}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in .env.pc1}
      - AUTH_ADMIN_CPF_ALLOWLIST=${AUTH_ADMIN_CPF_ALLOWLIST:-}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-["http://localhost:4300"]}

      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-janus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.pc1}
      - POSTGRES_DB=${POSTGRES_DB:-janus_db}

      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}

      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_MANAGEMENT_PORT=${RABBITMQ_MANAGEMENT_PORT:-15672}
      - RABBITMQ_USER=${RABBITMQ_USER:-janus}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env.pc1}

      - NEO4J_URI=${NEO4J_URI:?Set NEO4J_URI in .env.pc1 (bolt://<PC2_TAILSCALE_IP>:7687)}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.pc1}

      - QDRANT_HOST=${QDRANT_HOST:?Set QDRANT_HOST in .env.pc1 (<PC2_TAILSCALE_IP>)}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env.pc1}

      - OLLAMA_HOST=${OLLAMA_HOST:?Set OLLAMA_HOST in .env.pc1 (http://<PC2_TAILSCALE_IP>:11434)}
      - OLLAMA_ORCHESTRATOR_MODEL=${OLLAMA_ORCHESTRATOR_MODEL:-gpt-oss:20b}
      - OLLAMA_CODER_MODEL=${OLLAMA_CODER_MODEL:-deepseek-coder:6.7b}
      - OLLAMA_CURATOR_MODEL=${OLLAMA_CURATOR_MODEL:-ministral-3:14b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-120m}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - CHAT_UNLIMITED_USERS=${CHAT_UNLIMITED_USERS:-}

      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-5-mini}
      - DEEPSEEK_MODEL_NAME=${DEEPSEEK_MODEL_NAME:-deepseek-chat}
      - XAI_MODEL_NAME=${XAI_MODEL_NAME:-grok-4-1-fast-reasoning}

      - START_ORCHESTRATOR_WORKERS_ON_STARTUP=${START_ORCHESTRATOR_WORKERS_ON_STARTUP:-true}
      - AUTO_INDEX_ON_STARTUP=${AUTO_INDEX_ON_STARTUP:-true}
      - INIT_MAS_AGENTS_ON_STARTUP=${INIT_MAS_AGENTS_ON_STARTUP:-false}
      - AUTONOMY_SELF_STUDY_MAX_RUN_SECONDS=${AUTONOMY_SELF_STUDY_MAX_RUN_SECONDS:-600}
      - AUTONOMY_SELF_STUDY_RUN_DEADLINE_LOCAL=${AUTONOMY_SELF_STUDY_RUN_DEADLINE_LOCAL:-}
      - AUTONOMY_SELF_STUDY_LOCAL_ONLY=${AUTONOMY_SELF_STUDY_LOCAL_ONLY:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/scripts:/app/scripts:ro
      - janus_app_data:/app/data
      - janus_workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    mem_limit: 4g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 50s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-pc1-net

  janus-frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    image: janus-completo-janus-frontend:latest
    container_name: janus_frontend
    ports:
      - "${FRONTEND_PORT:-4300}:4300"
    depends_on:
      janus-api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1536m
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4300/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-pc1-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: janus_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-janus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-janus_db}
    volumes:
      - janus_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 1536m
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-pc1-net

  redis:
    image: redis:7-alpine
    container_name: janus_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - janus_redis_data:/data
    restart: unless-stopped
    mem_limit: 384m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-pc1-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: janus_rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-janus}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - janus_rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    mem_limit: 768m
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-pc1-net

networks:
  janus-pc1-net:
    driver: bridge

volumes:
  janus_postgres_data:
  janus_redis_data:
  janus_rabbitmq_data:
  janus_app_data:
  janus_workspace:
