<section class="access">
  <div class="access-panel">
    <div class="panel-glow" aria-hidden="true"></div>

    <div class="brand">
      <p class="eyebrow">JANUS // SOLICITAR ACESSO</p>
      <h1>Entre na lista de acesso</h1>
      <p class="sub">
        Preencha seus dados para solicitar acesso completo. Visitantes podem explorar o produto sem cadastro.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" aria-label="Solicitar acesso">
      <div class="field">
        <label for="name">Nome</label>
        <input id="name" type="text" formControlName="name" class="glass-input" placeholder="Seu nome" />
        <div class="field-error" *ngIf="form.controls.name.invalid && form.controls.name.touched">
          > INFORME UM NOME VALIDO
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" class="glass-input" placeholder="voce@janus.ai" />
        <div class="field-error" *ngIf="form.controls.email.invalid && form.controls.email.touched">
          > INFORME UM EMAIL VALIDO
        </div>
      </div>

      <button class="action primary" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'ENVIANDO...' : 'ENVIAR PEDIDO' }}
      </button>

      <div class="actions">
        <button type="button" class="link-button" (click)="enterVisitor()">Explorar como visitante</button>
        <a routerLink="/login">Voltar ao login</a>
      </div>

      <div class="alert success" *ngIf="success">
        > {{ success }}
      </div>
      <div class="alert error" *ngIf="error">
        > {{ error }}
      </div>
    </form>
  </div>
</section>
