<div class="consents">
  <h2>Consentimentos</h2>
  <div class="controls">
    <label>User ID:
      <input type="number" [(ngModel)]="userId"/>
    </label>
    <button (click)="loadConsents()">Carregar</button>
  </div>
  @if (items.length) {
  <table class="table">
    <thead>
      <tr><th>ID</th><th>Escopo</th><th>Concedido</th><th>Expira</th><th>Ações</th></tr>
    </thead>
    <tbody>
      @for (item of items; let i = $index; track i) {
      <tr>
        <td>{{ids[i] || '-'}}</td>
        <td>{{item.scope}}</td>
        <td>{{item.granted}}</td>
        <td>{{item.expires_at || '-'}}</td>
        <td>
          <button (click)="grant(item.scope)">Conceder</button>
          <button (click)="revoke(ids[i])" [disabled]="!ids[i]">Revogar</button>
        </td>
      </tr>
      }
    </tbody>
  </table>
  }
  <div class="grant-form">
    <h3>Novo consentimento</h3>
    <input type="text" [(ngModel)]="newScope" placeholder="Escopo (ex.: calendar.write)"/>
    <input type="text" [(ngModel)]="newExpires" placeholder="Expira (ISO opcional)"/>
    <button (click)="grant(newScope, newExpires)">Gravar</button>
  </div>
</div>
