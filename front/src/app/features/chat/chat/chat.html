<div class="chat-container">

  <div class="chat-main">
    <div class="chat-header">
      <div class="header-brand">
        <app-jarvis-avatar [size]="32" [state]="getAvatarState()"></app-jarvis-avatar>
        <div class="header-info">
          <h2>JANUS<span class="text-accent">AI</span></h2>
          <div class="status-indicator online">
            Online • Neural Link Active
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" [class.active]="hudVisible" (click)="toggleHud()" title="Toggle HUD">
          <span class="icon">👁️</span>
        </button>
      </div>
    </div>

    <div class="messages-list" #scrollContainer>
      <div class="welcome-message" *ngIf="messages.length === 0 && !loading">
        <app-jarvis-avatar [size]="120" state="idle"></app-jarvis-avatar>
        <h3>Bem-vindo ao Sistema Janus</h3>
        <p>Protocolos carregados. Como posso auxiliar você hoje?</p>
      </div>

      <div *ngFor="let msg of messages" class="message-item" [ngClass]="msg.role" [@messageAnimation]>
        <!-- Avatar Column -->
        <div class="message-avatar">
          <div class="avatar-circle user" *ngIf="msg.role === 'user'">👤</div>
          <app-jarvis-avatar [size]="36" state="idle" *ngIf="msg.role === 'assistant'"></app-jarvis-avatar>
        </div>

        <!-- Content Column -->
        <div class="message-content-wrapper">
          <div class="sender-name">{{ msg.role === 'user' ? 'Você' : 'Janus' }}</div>

          <!-- Reasoning Block -->
          <div class="thought-process" *ngIf="msg.reasoning">
            <details>
              <summary>
                <span class="icon">🧠</span>
                <span class="label">Processo de Raciocínio</span>
              </summary>
              <div class="thought-content markdown-content" [innerHTML]="msg.reasoning | markdown"></div>
            </details>
          </div>

          <!-- Main Text -->
          <div class="text markdown-content" [innerHTML]="msg.text | markdown"></div>

          <!-- Citations -->
          <div class="citations-list" *ngIf="msg.citations && msg.citations.length > 0">
            <div class="citations-label">Fontes Utilizadas:</div>
            <app-ui-citation-card *ngFor="let citation of msg.citations" [citation]="citation">
            </app-ui-citation-card>
          </div>

          <div class="meta">{{ (msg.timestamp || 0) * 1000 | date:'HH:mm' }}</div>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div class="message-item assistant" *ngIf="sending || voiceState === 'processing'">
        <div class="message-avatar">
          <app-jarvis-avatar [size]="36" state="thinking"></app-jarvis-avatar>
        </div>
        <div class="message-content-wrapper typing">
          <app-typing-indicator></app-typing-indicator>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea [(ngModel)]="newMessage" (keydown.enter)="onEnter($event)"
          placeholder="Envie uma mensagem ou comando..." [disabled]="sending || voiceState !== 'idle'" rows="1"
          class="auto-resize-input"
          oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
      </div>
      <div class="input-actions">
        <app-voice-orb [state]="voiceState" (startVoice)="onStartVoice()" (stopVoice)="onStopVoice()">
        </app-voice-orb>

        <button class="send-btn" (click)="sendMessage()" [disabled]="!newMessage.trim() || sending">
          <span class="material-icons">send</span>
        </button>
      </div>
    </div>
  </div>


  <app-hud-panel *ngIf="hudVisible" [connectionStatus]="connectionStatus" [title]="'Cognitive Stream'"
    [quickStats]="quickStats" [sections]="hudSections" [thoughts]="agentEvents" (clearThoughts)="clearHud()">
  </app-hud-panel>
</div>
