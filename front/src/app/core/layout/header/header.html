<header class="app-header">
  <div class="wrap">
    <div class="brand">
      Projeto Janus<span class="dot">•</span>
    </div>

    <button class="menu-toggle" aria-label="Abrir menu" [attr.aria-expanded]="isMenuOpen" (click)="toggleMenu()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav class="nav" id="primary-navigation" aria-label="Navegação principal" [class.open]="isMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
      <a routerLink="/arquitetura" routerLinkActive="active" (click)="closeMenu()">Arquitetura</a>
      <a routerLink="/sprints" routerLinkActive="active" (click)="closeMenu()">Sprints</a>
      <a routerLink="/conversations" routerLinkActive="active" (click)="closeMenu()">Conversas</a>
      <a routerLink="/gaps-janus" routerLinkActive="active" (click)="closeMenu()">Gaps Janus</a>
      <a routerLink="/documentacao" routerLinkActive="active" (click)="closeMenu()">Documentação</a>
      @if (isAuthenticated) {
        <button class="logout-btn" (click)="logout(); closeMenu()">Sair</button>
      }
    </nav>
  </div>
</header>
