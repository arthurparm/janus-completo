name: janus-portainer-16gb

services:
  janus-api:
    image: janus-completo-janus-api:latest
    container_name: janus_api
    init: true
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-["http://localhost:4300"]}

      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-janus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-janus_db}

      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_MANAGEMENT_PORT: ${RABBITMQ_MANAGEMENT_PORT:-15672}
      RABBITMQ_USER: ${RABBITMQ_USER:-janus}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_ORCHESTRATOR_MODEL: ${OLLAMA_ORCHESTRATOR_MODEL:-gpt-oss:20b}
      OLLAMA_CODER_MODEL: ${OLLAMA_CODER_MODEL:-deepseek-coder:6.7b}
      OLLAMA_CURATOR_MODEL: ${OLLAMA_CURATOR_MODEL:-ministral-3:14b}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}

      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-5-mini}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-deepseek-chat}
      XAI_MODEL_NAME: ${XAI_MODEL_NAME:-grok-4-1-fast-reasoning}

      START_ORCHESTRATOR_WORKERS_ON_STARTUP: ${START_ORCHESTRATOR_WORKERS_ON_STARTUP:-true}
      AUTO_INDEX_ON_STARTUP: ${AUTO_INDEX_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - janus_app_data:/app/data
      - janus_workspace:/app/workspace
    restart: unless-stopped
    mem_limit: 4g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 50s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: janus_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-janus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-janus_db}
    volumes:
      - janus_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 1536m
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-net

  redis:
    image: redis:7-alpine
    container_name: janus_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - janus_redis_data:/data
    restart: unless-stopped
    mem_limit: 384m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: janus_rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-janus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - janus_rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    mem_limit: 768m
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - janus-net

networks:
  janus-net:
    driver: bridge

volumes:
  janus_postgres_data:
  janus_redis_data:
  janus_rabbitmq_data:
  janus_app_data:
  janus_workspace:
