apiVersion: 1
datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3100
    isDefault: false
    jsonData:
      tracesToLogs:
        datasourceUid: Loki
        spanStartTimeShift: '1m'
        spanEndTimeShift: '1m'
        tags: ['trace_id']
      serviceMap:
        datasourceUid: Prometheus